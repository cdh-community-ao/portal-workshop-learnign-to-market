<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Mosaico de Participantes</title>
  <link rel="stylesheet" href="./src/css/style.css">
</head>

<body>

<header>
  <h1>Participantes do Evento</h1>
  <input type="text" id="search" placeholder="Pesquisar participante...">
</header>

<div class="tabs">
  <button onclick="trocarLista('convidados', event)" class="active">Convidados</button>
  <button onclick="trocarLista('reservas', event)">Reservas</button>
  <button onclick="trocarLista('instituicoes', event)">Instituições</button>
</div>

<div class="sub-tabs hidden" id="subInstituicoes">
  <button onclick="filtrarInstituicao('inst1')">Empresa A</button>
  <button onclick="filtrarInstituicao('inst2')">Empresa B</button>
  <button onclick="filtrarInstituicao('inst3')">Universidade C</button>
</div>

<section class="grid" id="grid"></section>

<script src="./src/js/script.js"></script>
</body>
</html>
